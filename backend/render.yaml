services:
  - type: web
    name: astram-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python eda.py && python -m ml.train
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PORT
        value: "10000"
    healthCheckPath: /health
    autoDeploy: true
